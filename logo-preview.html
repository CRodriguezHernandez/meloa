<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@800&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:40px;padding:40px;}
.logo-box{display:flex;flex-direction:column;align-items:center;gap:12px;}
.label{color:rgba(255,255,255,.4);font-family:monospace;font-size:12px;}
.bg-white{background:#fff;padding:24px 40px;border-radius:12px;}
.bg-dark{background:#0F0E1A;padding:24px 40px;border-radius:12px;}
.bg-purple{background:linear-gradient(135deg,#4E0C82,#4F46E5);padding:24px 40px;border-radius:12px;}
</style>
</head>
<body>
<div class="logo-box">
  <div class="label">logo-horizontal.svg — fondo claro (navbar)</div>
  <div class="bg-white">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" height="60">
      <text x="6" y="78" font-family="Sora,Arial Black,sans-serif" font-weight="800" font-size="82" fill="#4E0C82" letter-spacing="-1">Udee</text>
      <text x="238" y="78" font-family="Sora,Arial Black,sans-serif" font-weight="800" font-size="82" fill="#1a1a1a" letter-spacing="-1">bit</text>
    </svg>
  </div>
</div>
<div class="logo-box">
  <div class="label">logo-horizontal-white.svg — fondo oscuro (footer)</div>
  <div class="bg-dark">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" height="60">
      <text x="6" y="78" font-family="Sora,Arial Black,sans-serif" font-weight="800" font-size="82" fill="#ffffff" letter-spacing="-1">Udee</text>
      <text x="238" y="78" font-family="Sora,Arial Black,sans-serif" font-weight="800" font-size="82" fill="#A78BFA" letter-spacing="-1">bit</text>
    </svg>
  </div>
</div>
<div class="logo-box">
  <div class="label">logo-icono.svg — ícono gradiente oscuro</div>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="80" height="80">
    <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4E0C82"/><stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient></defs>
    <rect width="100" height="100" rx="22" fill="url(#g)"/>
    <text x="50" y="72" font-family="Sora,Arial Black,sans-serif" font-weight="800" font-size="62" fill="#fff" text-anchor="middle">U</text>
  </svg>
</div>
<div class="logo-box">
  <div class="label">logo-icono-light.svg — ícono fondo claro</div>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="80" height="80">
    <rect width="100" height="100" rx="22" fill="#EDE9FE"/>
    <text x="50" y="72" font-family="Sora,Arial Black,sans-serif" font-weight="800" font-size="62" fill="#4E0C82" text-anchor="middle">U</text>
  </svg>
</div>
</body>
</html>
